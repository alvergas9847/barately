<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARATELY — Mi cuenta</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#09090f;--surface:#111118;--surface2:#18181f;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --accent:#6c5ce7;--accent-glow:rgba(108,92,231,0.25);
  --text:#ededf5;--muted:#6b6b82;
  --danger:#e84343;--success:#43c59e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:20px;position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 20% 50%,rgba(108,92,231,0.08) 0%,transparent 70%),
             radial-gradient(ellipse 40% 60% at 80% 30%,rgba(67,197,158,0.05) 0%,transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}

.wrap{width:100%;max-width:420px;position:relative;z-index:1;animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* ── Brand ───────────────────────────────────────── */
.brand{text-align:center;margin-bottom:32px;}
.brand a{text-decoration:none;}
.brand-name{
  font-family:'Syne',sans-serif;font-weight:800;font-size:38px;
  letter-spacing:.12em;
  background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
}
.brand-tag{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  letter-spacing:.2em;text-transform:uppercase;margin-top:6px;
}

/* ── Tabs ────────────────────────────────────────── */
.tabs{
  display:flex;background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;
  padding:4px;margin-bottom:24px;
}
.tab{
  flex:1;text-align:center;padding:10px;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .2s;border:none;background:none;
  font-family:'DM Sans',sans-serif;
}
.tab.active{background:var(--accent);color:#fff;}

/* ── Card ────────────────────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:32px;
  box-shadow:0 0 60px rgba(0,0,0,.4),0 0 0 1px var(--border);
}

/* ── Panel (tab content) ─────────────────────────── */
.panel{display:none;}
.panel.active{display:block;}

/* ── Fields ──────────────────────────────────────── */
.field{margin-bottom:18px;position:relative;}
.field label{
  display:block;font-size:11px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;
}
.field input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;font-size:15px;
  font-family:'DM Sans',sans-serif;color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.field input::placeholder{color:var(--muted);}
.field input.error-field{border-color:var(--danger);}
.pin-wrap{position:relative;}
.pin-wrap input{padding-right:44px;}
.toggle-pin{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:18px;padding:4px;
  transition:color .2s;
}
.toggle-pin:hover{color:var(--text);}
.field-hint{font-size:11px;color:var(--muted);margin-top:4px;}

/* ── Button ──────────────────────────────────────── */
.btn{
  width:100%;background:var(--accent);color:#fff;border:none;
  border-radius:10px;padding:15px;font-size:15px;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;
  transition:opacity .2s,transform .1s,box-shadow .2s;
  letter-spacing:.04em;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{opacity:.9;box-shadow:0 4px 24px var(--accent-glow);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-text{transition:opacity .2s;}

/* ── Error / success ─────────────────────────────── */
.msg-box{
  border-radius:8px;padding:10px 14px;
  font-size:12px;margin-top:14px;text-align:center;display:none;
}
.msg-box.show{display:block;}
.msg-box.err{
  background:rgba(232,67,67,.1);border:1px solid rgba(232,67,67,.25);color:var(--danger);
}
.msg-box.ok{
  background:rgba(67,197,158,.1);border:1px solid rgba(67,197,158,.25);color:var(--success);
}

/* ── Footer ──────────────────────────────────────── */
.footer{
  text-align:center;margin-top:24px;font-size:11px;
  color:var(--muted);line-height:1.6;position:relative;z-index:1;
}
.footer a{color:var(--muted);text-decoration:none;}
.footer a:hover{color:var(--text);}
</style>
</head>
<body>

<div class="wrap">
  <!-- Brand -->
  <div class="brand">
    <a href="tienda.html"><div class="brand-name">BARATELY</div></a>
    <div class="brand-tag">Tienda Online · Guatemala</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Iniciar sesión</button>
    <button class="tab" id="tabReg" onclick="switchTab('registro')">Crear cuenta</button>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- ── PANEL LOGIN ── -->
    <div class="panel active" id="panelLogin">
      <div class="field">
        <label>Teléfono</label>
        <input type="tel" id="loginTel"
          placeholder="5555-1234"
          inputmode="tel"
          autocomplete="tel"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <div class="field">
        <label>PIN de acceso</label>
        <div class="pin-wrap">
          <input type="password" id="loginPin"
            placeholder="PIN (4-8 dígitos)"
            inputmode="text"
            autocomplete="current-password"
            onkeydown="if(event.key==='Enter') doLogin()">
          <button class="toggle-pin" type="button" onclick="togglePin('loginPin',this)">&#128065;</button>
        </div>
      </div>
      <button class="btn" id="btnLogin" onclick="doLogin()">
        <span class="btn-text" id="btnLoginText">Entrar</span>
      </button>
      <div class="msg-box" id="loginMsg"></div>
      <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--muted);">
        ¿No tienes cuenta?
        <button onclick="switchTab('registro')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;">Regístrate gratis</button>
      </div>
    </div>

    <!-- ── PANEL REGISTRO ── -->
    <div class="panel" id="panelReg">
      <div class="field">
        <label>Nombre completo *</label>
        <input type="text" id="regNombre"
          placeholder="Tu nombre completo"
          autocomplete="name">
      </div>
      <div class="field">
        <label>Teléfono / WhatsApp *</label>
        <input type="tel" id="regTel"
          placeholder="5555-1234"
          inputmode="tel"
          autocomplete="tel">
      </div>
      <div class="field">
        <label>Email (opcional)</label>
        <input type="email" id="regEmail"
          placeholder="tu@email.com"
          inputmode="email"
          autocomplete="email">
      </div>
      <div class="field">
        <label>Crear PIN *</label>
        <div class="pin-wrap">
          <input type="password" id="regPin"
            placeholder="4-8 dígitos"
            inputmode="text"
            autocomplete="new-password"
            maxlength="8">
          <button class="toggle-pin" type="button" onclick="togglePin('regPin',this)">&#128065;</button>
        </div>
        <div class="field-hint">Tu PIN es para acceder a tu cuenta. Usa 4 a 8 dígitos.</div>
      </div>
      <div class="field">
        <label>Confirmar PIN *</label>
        <div class="pin-wrap">
          <input type="password" id="regPinConfirm"
            placeholder="Repite tu PIN"
            inputmode="text"
            autocomplete="new-password"
            maxlength="8"
            onkeydown="if(event.key==='Enter') doRegister()">
          <button class="toggle-pin" type="button" onclick="togglePin('regPinConfirm',this)">&#128065;</button>
        </div>
      </div>
      <button class="btn" id="btnReg" onclick="doRegister()">
        <span class="btn-text" id="btnRegText">Crear cuenta</span>
      </button>
      <div class="msg-box" id="regMsg"></div>
      <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--muted);">
        ¿Ya tienes cuenta?
        <button onclick="switchTab('login')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;">Iniciar sesión</button>
      </div>
    </div>

  </div><!-- /card -->
</div><!-- /wrap -->

<div class="footer">
  <a href="tienda.html">&#8592; Volver a la tienda</a><br>
  BARATELY &middot; 19 calle 1-52 Zona 3, Guatemala
</div>

<script>
const SUPABASE_URL = 'https://mcbbdzldvlmcpbhzlkpn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jYmJkemxkdmxtY3BiaHpsa3BuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTQ4MzAsImV4cCI6MjA4OTY5MDgzMH0.TmccIp3NdW_YnvR5whRsO3zLIyrzO-RZTPjN5OGqo3Y';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const CLIENTE_KEY = 'barately_cliente';

// ── Redirect destino ──────────────────────────────────
function getRedirectUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('redirect') || 'tienda.html';
}

// ── Tabs ──────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabReg').classList.toggle('active', tab === 'registro');
  document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
  document.getElementById('panelReg').classList.toggle('active', tab === 'registro');
}

// ── Toggle PIN visibility ─────────────────────────────
function togglePin(inputId, btn) {
  const inp = document.getElementById(inputId);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.textContent = isText ? '👁' : '🙈';
}

// ── Mostrar mensaje ───────────────────────────────────
function showMsg(elId, text, type) {
  const el = document.getElementById(elId);
  el.textContent = text;
  el.className = `msg-box ${type} show`;
}

function hideMsg(elId) {
  document.getElementById(elId).classList.remove('show');
}

// ── LOGIN ─────────────────────────────────────────────
async function doLogin() {
  const tel = document.getElementById('loginTel').value.trim().replace(/\s/g,'');
  const pin = document.getElementById('loginPin').value.trim().replace(/\s/g,'');
  const btn = document.getElementById('btnLogin');
  const btnText = document.getElementById('btnLoginText');

  if (!tel || !pin) {
    showMsg('loginMsg', 'Completa todos los campos.', 'err');
    return;
  }

  btn.disabled = true;
  btnText.textContent = 'Verificando...';
  hideMsg('loginMsg');

  try {
    const { data, error } = await sb
      .from('clientes')
      .select('id, nombre, apellidos, telefono, whatsapp, email, activo_web, pin_cliente')
      .eq('activo_web', true)
      .limit(50);

    if (error) throw error;

    // Buscar por teléfono (flexible: ignorar guiones/espacios)
    const normalTel = tel.replace(/[-\s]/g, '');
    const cliente = (data || []).find(c => {
      const dbTel = (c.telefono || '').replace(/[-\s]/g, '');
      return dbTel === normalTel;
    });

    if (!cliente) {
      showMsg('loginMsg', 'Teléfono no registrado o cuenta inactiva.', 'err');
      btn.disabled = false;
      btnText.textContent = 'Entrar';
      return;
    }

    const dbPin = (cliente.pin_cliente || '').trim();
    if (dbPin !== pin) {
      showMsg('loginMsg', 'PIN incorrecto.', 'err');
      btn.disabled = false;
      btnText.textContent = 'Entrar';
      return;
    }

    // Guardar sesión
    const session = {
      id: cliente.id,
      nombre: cliente.nombre + (cliente.apellidos ? ' ' + cliente.apellidos : ''),
      telefono: cliente.telefono,
      email: cliente.email || ''
    };
    localStorage.setItem(CLIENTE_KEY, JSON.stringify(session));

    showMsg('loginMsg', '¡Bienvenido! Redirigiendo...', 'ok');
    setTimeout(() => {
      window.location.href = getRedirectUrl();
    }, 800);

  } catch(e) {
    console.error('doLogin:', e);
    showMsg('loginMsg', 'Error al conectar. Intenta nuevamente.', 'err');
    btn.disabled = false;
    btnText.textContent = 'Entrar';
  }
}

// ── REGISTRO ──────────────────────────────────────────
async function doRegister() {
  const nombre = document.getElementById('regNombre').value.trim();
  const tel    = document.getElementById('regTel').value.trim().replace(/\s/g,'');
  const email  = document.getElementById('regEmail').value.trim();
  const pin    = document.getElementById('regPin').value.trim().replace(/\s/g,'');
  const pinC   = document.getElementById('regPinConfirm').value.trim().replace(/\s/g,'');
  const btn    = document.getElementById('btnReg');
  const btnText = document.getElementById('btnRegText');

  hideMsg('regMsg');

  if (!nombre || !tel || !pin || !pinC) {
    showMsg('regMsg', 'Completa los campos obligatorios.', 'err');
    return;
  }
  if (pin.length < 4 || pin.length > 8) {
    showMsg('regMsg', 'El PIN debe tener entre 4 y 8 dígitos.', 'err');
    return;
  }
  if (pin !== pinC) {
    showMsg('regMsg', 'Los PINes no coinciden.', 'err');
    return;
  }

  btn.disabled = true;
  btnText.textContent = 'Creando cuenta...';

  try {
    // Verificar si el teléfono ya existe
    const { data: existing } = await sb
      .from('clientes')
      .select('id')
      .eq('telefono', tel)
      .limit(1);

    if (existing && existing.length > 0) {
      showMsg('regMsg', 'Ese teléfono ya está registrado. Intenta iniciar sesión.', 'err');
      btn.disabled = false;
      btnText.textContent = 'Crear cuenta';
      return;
    }

    // Separar nombre y apellidos
    const partes = nombre.split(' ');
    const primerNombre = partes[0];
    const apellidos = partes.slice(1).join(' ') || '';

    // Insertar cliente
    const { data: newCliente, error: insertErr } = await sb
      .from('clientes')
      .insert({
        nombre: primerNombre,
        apellidos: apellidos || null,
        telefono: tel,
        whatsapp: tel,
        email: email || null,
        pin_cliente: pin,
        activo_web: true,
        activo: true,
        fuente: 'web'
      })
      .select('id, nombre, apellidos, telefono, email')
      .single();

    if (insertErr) throw insertErr;

    // Guardar sesión
    const session = {
      id: newCliente.id,
      nombre: newCliente.nombre + (newCliente.apellidos ? ' ' + newCliente.apellidos : ''),
      telefono: newCliente.telefono,
      email: newCliente.email || ''
    };
    localStorage.setItem(CLIENTE_KEY, JSON.stringify(session));

    showMsg('regMsg', '¡Cuenta creada! Redirigiendo...', 'ok');
    setTimeout(() => {
      window.location.href = getRedirectUrl();
    }, 900);

  } catch(e) {
    console.error('doRegister:', e);
    showMsg('regMsg', 'Error al crear la cuenta. Intenta nuevamente.', 'err');
    btn.disabled = false;
    btnText.textContent = 'Crear cuenta';
  }
}

// ── Revisar si ya está logueado ───────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const cliente = JSON.parse(localStorage.getItem(CLIENTE_KEY) || 'null');
  if (cliente) {
    // Ya está logueado, redirigir directamente
    window.location.href = getRedirectUrl();
  }
});
</script>
</body>
</html>
