<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARATELY — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nav.js"></script>
<script>document.write(Nav.sidebarCSS())</script>
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#7c6aff;--accent-glow:rgba(124,106,255,0.2);
  --text:#f0f0f8;--muted:#6b6b80;--muted2:#3a3a50;
  --success:#6affb4;--danger:#ff6a6a;--warning:#ffb76a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* ── LAYOUT ── */
.nav-main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50;}
.page-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.nav-hamburger{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.fecha-chip{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'DM Mono',monospace;}
.btn-logout{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-logout:hover{color:var(--danger);border-color:var(--danger);}
.content{padding:24px 28px;flex:1;}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;}
.kpi:hover{transform:translateY(-2px);border-color:var(--muted2);}
.kpi-dot{position:absolute;right:16px;top:16px;width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.6);}}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.kpi-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:8px;}
.kpi-sub{font-size:11px;color:var(--muted);}
.kpi-trend{font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:3px;margin-top:4px;}
.trend-up{color:var(--success);}
.trend-dn{color:var(--danger);}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.card-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.card-body{padding:20px;}
.card-tag{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:99px;}
.tag-live{background:rgba(106,255,180,.1);color:var(--success);}
.tag-ia{background:rgba(124,106,255,.12);color:var(--accent);}

/* ── GRID ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px;}

/* ── CHART ── */
.chart-wrap{height:120px;display:flex;align-items:flex-end;gap:6px;padding:0 4px;}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.chart-bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s ease;min-height:4px;}
.chart-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}

/* ── TABLA ── */
.tabla{width:100%;border-collapse:collapse;}
.tabla th{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.tabla td{padding:11px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
.tabla tr:last-child td{border-bottom:none;}
.tabla tr:hover td{background:rgba(255,255,255,0.02);}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.progress{height:4px;border-radius:99px;background:var(--muted2);overflow:hidden;width:60px;}
.progress-fill{height:100%;border-radius:99px;}

/* ── MÉTODOS PAGO ── */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.donut{width:80px;height:80px;flex-shrink:0;}
.donut-legend{flex:1;}
.donut-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;}
.donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.donut-pct{margin-left:auto;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;}

/* ── ALERTAS ── */
.alerta-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.alerta-item:last-child{border-bottom:none;}
.alerta-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ai-red{background:rgba(255,106,106,.12);}
.ai-amber{background:rgba(255,183,106,.12);}
.ai-purple{background:rgba(124,106,255,.12);}
.ai-green{background:rgba(106,255,180,.1);}
.alerta-title{font-size:12px;font-weight:500;margin-bottom:2px;}
.alerta-desc{font-size:11px;color:var(--muted);}

/* ── FINANZAS ── */
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.fin-row:last-child{border-bottom:none;}
.fin-label{color:var(--muted);}
.fin-val{font-weight:500;font-family:'DM Mono',monospace;}

/* ── LOADING ── */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:900px){
  .nav-main{margin-left:0;}
  .nav-hamburger{display:block!important;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .content{padding:16px;}
  .topbar{padding:12px 16px;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<script>document.write(Nav.sidebarHTML())</script>

<div class="nav-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="nav-hamburger" onclick="Nav.toggleSidebar()">☰</button>
      <div class="page-title">Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="fecha-chip" id="navFecha"></div>
      <button class="btn-logout" onclick="Nav.logout()">Salir</button>
    </div>
  </div>

  <div class="content">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpiGrid">
      <div class="loading"><span class="spinner"></span>Cargando...</div>
    </div>

    <!-- Ventas 7 días + Métodos de pago -->
    <div class="grid-3">
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">Ventas últimos 7 días</div>
          <span class="card-tag tag-live">En vivo</span>
        </div>
        <div class="card-body">
          <div class="chart-wrap" id="chartVentas">
            <div class="loading"><span class="spinner"></span></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><div class="card-title">Métodos de pago</div></div>
        <div class="card-body" id="metodosPago">
          <div class="loading"><span class="spinner"></span></div>
        </div>
      </div>
    </div>

    <!-- Vendedores hoy + Alertas IA -->
    <div class="grid-2">
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">Vendedores hoy</div>
          <span class="card-tag tag-live">Tiempo real</span>
        </div>
        <div id="tablaVendedores">
          <div class="loading"><span class="spinner"></span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">Alertas IA</div>
          <span class="card-tag tag-ia">✦ IA Activa</span>
        </div>
        <div class="card-body" id="alertasIA">
          <div class="loading"><span class="spinner"></span></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── Helpers ───────────────────────────────────────────────────
const Q = v => `Q${parseFloat(v||0).toLocaleString('es-GT',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const hoy = new Date().toISOString().split('T')[0];
const inicioMes = hoy.substring(0,7)+'-01';

const AV_COLORS = [
  ['rgba(124,106,255,.2)','#b06aff'],
  ['rgba(106,255,180,.15)','#6affb4'],
  ['rgba(255,183,106,.15)','#ffb76a'],
  ['rgba(255,106,106,.15)','#ff6a6a'],
  ['rgba(255,255,255,.06)','#6b6b80'],
];

// ── KPIs ──────────────────────────────────────────────────────
async function loadKPIs() {
  const sb = Nav.getSb();
  const [resV, resE, resU, resS] = await Promise.all([
    sb.from('ventas').select('total').eq('estado','completada').gte('fecha', hoy),
    sb.from('egresos').select('monto').gte('fecha', inicioMes),
    sb.from('usuarios').select('id').eq('activo', true),
    sb.from('vw_stock_bajo').select('*'),
  ]);
  const totalHoy   = (resV.data||[]).reduce((s,v)=>s+parseFloat(v.total||0),0);
  const numV       = (resV.data||[]).length;
  const ticketProm = numV > 0 ? totalHoy/numV : 0;
  const egresosMes = (resE.data||[]).reduce((s,e)=>s+parseFloat(e.monto||0),0);
  const numU       = (resU.data||[]).length;
  const stockCrit  = (resS.data||[]).length;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi">
      <div class="kpi-dot" style="background:var(--success)"></div>
      <div class="kpi-label">Ventas hoy</div>
      <div class="kpi-value" style="color:var(--success)">${Q(totalHoy)}</div>
      <div class="kpi-sub">${numV} transacciones</div>
      <div class="kpi-trend trend-up">▲ Ticket promedio ${Q(ticketProm)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Egresos del mes</div>
      <div class="kpi-value" style="color:var(--danger)">${Q(egresosMes)}</div>
      <div class="kpi-sub">Mes actual</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Usuarios activos</div>
      <div class="kpi-value">${numU}</div>
      <div class="kpi-sub">En el sistema</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Stock crítico</div>
      <div class="kpi-value" style="color:var(--warning)">${stockCrit}</div>
      <div class="kpi-sub">Variantes bajo mínimo</div>
    </div>`;
}

// ── GRÁFICA 7 DÍAS ────────────────────────────────────────────
async function loadChart() {
  const sb = Nav.getSb();
  const dias = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    dias.push(d.toISOString().split('T')[0]);
  }
  const res = await sb.from('ventas')
    .select('total,fecha')
    .eq('estado','completada')
    .gte('fecha', dias[0]);
  const data = res.data||[];
  const totales = dias.map(d =>
    data.filter(v=>v.fecha?.startsWith(d)).reduce((s,v)=>s+parseFloat(v.total||0),0)
  );
  const maxV = Math.max(...totales,1);
  const LABS = ['L','M','M','J','V','S','D'];
  const wrap = document.getElementById('chartVentas');
  wrap.innerHTML = '';
  totales.forEach((v,i) => {
    const pct  = Math.max(4, Math.round((v/maxV)*100));
    const esHoy = i === 6;
    const col  = document.createElement('div');
    col.className = 'chart-bar-col';
    col.innerHTML = `
      <div class="chart-bar" style="height:${pct}%;background:${esHoy?'var(--accent)':'var(--muted2)'}"></div>
      <div class="chart-label">${LABS[new Date(dias[i]+'T12:00:00').getDay()]}</div>`;
    wrap.appendChild(col);
  });
}

// ── MÉTODOS PAGO ──────────────────────────────────────────────
async function loadMetodos() {
  const sb = Nav.getSb();
  const res = await sb.from('pagos_venta')
    .select('monto,metodos_pago(nombre)')
    .gte('creado_en', inicioMes);
  const data = res.data||[];
  const totales = {};
  data.forEach(p => {
    const n = p.metodos_pago?.nombre||'Otro';
    totales[n] = (totales[n]||0) + parseFloat(p.monto||0);
  });
  const total = Object.values(totales).reduce((s,v)=>s+v,0)||1;
  const COLORS = ['#6affb4','#7c6aff','#ffb76a','#ff6a6a','#6b6b80'];
  const items  = Object.entries(totales).sort((a,b)=>b[1]-a[1]);
  if(!items.length){
    document.getElementById('metodosPago').innerHTML='<div style="color:var(--muted);font-size:12px">Sin datos del mes.</div>';
    return;
  }
  // SVG donut simple
  let offset=0, paths='';
  const r=30,cx=40,cy=40,stroke=10;
  items.forEach(([n,v],i)=>{
    const pct=v/total;
    const dash=pct*2*Math.PI*r;
    const gap=(1-pct)*2*Math.PI*r;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COLORS[i%COLORS.length]}"
      stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}"
      stroke-dashoffset="${-offset*2*Math.PI*r}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct;
  });
  document.getElementById('metodosPago').innerHTML = `
    <div class="donut-wrap">
      <svg class="donut" viewBox="0 0 80 80">${paths}</svg>
      <div class="donut-legend">
        ${items.map(([n,v],i)=>`
          <div class="donut-item">
            <div class="donut-dot" style="background:${COLORS[i%COLORS.length]}"></div>
            <span>${n}</span>
            <span class="donut-pct">${Math.round(v/total*100)}%</span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── VENDEDORES HOY ────────────────────────────────────────────
async function loadVendedores() {
  const sb = Nav.getSb();
  const res = await sb.from('vw_ventas_hoy').select('*');
  const data = res.data||[];
  if(!data.length){
    document.getElementById('tablaVendedores').innerHTML='<div class="loading">Sin ventas registradas hoy.</div>';
    return;
  }
  const maxT = Math.max(...data.map(r=>parseFloat(r.total_vendido||0)),1);
  document.getElementById('tablaVendedores').innerHTML = `
    <table class="tabla">
      <thead><tr><th>Vendedor</th><th>Ventas</th><th>Total</th><th>Avance</th></tr></thead>
      <tbody>${data.map((r,i)=>{
        const [bg,tc]=AV_COLORS[i%AV_COLORS.length];
        const pct=Math.round(parseFloat(r.total_vendido||0)/maxT*100);
        return `<tr>
          <td><div style="display:flex;align-items:center;gap:8px;">
            <div class="av" style="background:${bg};color:${tc}">${(r.vendedor||'?')[0]}</div>
            ${r.vendedor}
          </div></td>
          <td style="color:var(--muted)">${r.num_ventas||0}</td>
          <td style="color:var(--success);font-weight:500">${Q(r.total_vendido||0)}</td>
          <td><div class="progress"><div class="progress-fill" style="width:${pct}%;background:${tc}"></div></div></td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

// ── ALERTAS IA ────────────────────────────────────────────────
async function loadAlertas() {
  const sb = Nav.getSb();
  const res = await sb.from('vw_alertas_pendientes').select('*').limit(4);
  const data = res.data||[];
  const ICONOS={stock_critico:'🔴',temporada_proxima:'📅',producto_muerto:'💤',cliente_inactivo:'👤',reorden_sugerido:'📦'};
  const CLASE ={stock_critico:'ai-red',temporada_proxima:'ai-amber',producto_muerto:'ai-purple',cliente_inactivo:'ai-green',reorden_sugerido:'ai-amber'};
  if(!data.length){
    document.getElementById('alertasIA').innerHTML='<div style="color:var(--success);font-size:13px">✓ Sin alertas pendientes</div>';
    return;
  }
  document.getElementById('alertasIA').innerHTML = data.map(a=>`
    <div class="alerta-item">
      <div class="alerta-icon ${CLASE[a.tipo]||'ai-purple'}">${ICONOS[a.tipo]||'•'}</div>
      <div>
        <div class="alerta-title">${a.titulo}</div>
        <div class="alerta-desc">${a.mensaje}</div>
      </div>
    </div>`).join('');
}

// ── INICIO ────────────────────────────────────────────────────
Nav.init('dashboard');
Promise.all([loadKPIs(), loadChart(), loadMetodos(), loadVendedores(), loadAlertas()]);
</script>
</body>
</html>
