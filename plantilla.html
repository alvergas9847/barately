<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARATELY — [NOMBRE PÁGINA]</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 1. Estilos del nav compartido -->
<script src="nav.js"></script>
<script>document.write(Nav.sidebarCSS())</script>

<style>
/* ── Variables globales ── */
:root{
  --bg:#09090f;--surface:#111118;--surface2:#18181f;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --accent:#6c5ce7;--accent-glow:rgba(108,92,231,0.2);
  --text:#ededf5;--muted:#6b6b82;--muted2:#3a3a4a;
  --success:#43c59e;--danger:#e84343;--warning:#f0a500;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* ── Layout ── */
.nav-main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50;}
.page-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.nav-hamburger{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.fecha-tag{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;}
.btn-logout{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-logout:hover{color:var(--danger);border-color:var(--danger);}
.content{padding:24px 28px;flex:1;}

/* ── Componentes reutilizables ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.card-body{padding:18px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.kpi-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;line-height:1;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.tabla{width:100%;border-collapse:collapse;}
.tabla th{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.tabla td{padding:10px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
.tabla tr:last-child td{border-bottom:none;}
.tabla tr:hover td{background:rgba(255,255,255,0.02);}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s;}
.btn-primary:hover{opacity:.88;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{background:none;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:9px 18px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{color:var(--text);border-color:var(--border2);}
.tag{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:99px;}
.tag-green{background:rgba(67,197,158,.12);color:var(--success);}
.tag-red{background:rgba(232,67,67,.12);color:var(--danger);}
.tag-warn{background:rgba(240,165,0,.12);color:var(--warning);}
.tag-accent{background:rgba(108,92,231,.12);color:var(--accent);}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select option{background:var(--surface2);}
.field input::placeholder,.field textarea::placeholder{color:var(--muted);}
.field textarea{resize:vertical;min-height:70px;}
@media(max-width:900px){
  .content{padding:16px;}
  .topbar{padding:12px 16px;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- 2. Sidebar compartido -->
<script>document.write(Nav.sidebarHTML())</script>

<!-- 3. Contenido principal -->
<div class="nav-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="nav-hamburger" onclick="Nav.toggleSidebar()">☰</button>
      <div class="page-title">[TÍTULO DE LA PÁGINA]</div>
    </div>
    <div class="topbar-right">
      <div class="fecha-tag" id="navFecha"></div>
      <button class="btn-logout" onclick="Nav.logout()">Salir</button>
    </div>
  </div>

  <div class="content">
    <!-- CONTENIDO DE LA PÁGINA AQUÍ -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">Módulo en construcción</div>
      </div>
      <div class="card-body">
        <p style="color:var(--muted);font-size:13px">Contenido del módulo aquí.</p>
      </div>
    </div>
  </div>
</div>

<!-- 4. Inicializar nav (cambiar 'dashboard' por el id de la página) -->

</body>
</html>
